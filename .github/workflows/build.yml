name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept licenses
        run: yes | sdkmanager --licenses || true

      - name: Install Gradle & generate wrapper
        run: |
          # Download Gradle
          curl -sL "https://services.gradle.org/distributions/gradle-8.2-bin.zip" -o /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt
          export PATH="/opt/gradle-8.2/bin:$PATH"
          
          # Generate gradle wrapper in project
          cd $GITHUB_WORKSPACE
          gradle wrapper --gradle-version 8.2 --distribution-type all
          
          # Make executable
          chmod +x gradlew

      - name: Build debug APK
        run: |
          export ANDROID_HOME=$ANDROID_SDK_ROOT
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: pusheen-assistant-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30
